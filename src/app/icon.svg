<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#shine)"/>
  <ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.4"/>
  <ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.4" transform="rotate(60 32 32)"/>
  <ellipse cx="32" cy="32" rx="22" ry="9" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.4" transform="rotate(-60 32 32)"/>
  <text x="32" y="44" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" font-weight="900" font-size="34" text-anchor="middle" fill="#ffffff" filter="url(#glow)">A</text>
</svg>
